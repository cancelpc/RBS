<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輪播後台</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div class="admin-app">
    <aside class="admin-nav">
      <div>
        <div class="brand">RBS Admin</div>
        <div class="hint" id="mode-status">載入中</div>
      </div>
      <nav class="nav-list" aria-label="後台導覽">
        <button class="nav-item active" data-section="overview" onclick="showSection('overview')">總覽</button>
        <button class="nav-item" data-section="media" onclick="showSection('media')">影片</button>
        <button class="nav-item" data-section="playlists" onclick="showSection('playlists')">清單</button>
        <button class="nav-item" data-section="schedules" onclick="showSection('schedules')">排程</button>
        <button class="nav-item" data-section="clients" onclick="showSection('clients')">Client</button>
        <button class="nav-item" data-section="settings" onclick="showSection('settings')">設定</button>
      </nav>
      <div class="nav-actions">
        <a href="/" class="top-link">前台播放器</a>
        <button class="secondary" onclick="logoutAdmin()">登出</button>
      </div>
    </aside>

    <main class="admin-workspace">
      <header class="workspace-header">
        <div>
          <div class="eyebrow" id="section-eyebrow">總覽</div>
          <h1 id="section-title">營運概況</h1>
        </div>
        <div class="status-block compact-status">
          <div class="status-label">同步狀態</div>
          <div class="status-value" id="sync-status">尚未執行同步。</div>
          <div class="small" id="version-status"></div>
        </div>
      </header>

      <section class="admin-section active" id="section-overview">
        <div class="stats-grid" id="summary-cards"></div>
        <div class="overview-grid">
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">快速動作</div>
                <h2>常用操作</h2>
              </div>
            </div>
            <div class="action-grid">
              <button onclick="showSection('media')">管理影片</button>
              <button onclick="showSection('playlists')">管理清單</button>
              <button onclick="showSection('schedules')">管理排程</button>
              <button class="secondary" onclick="runUpstreamSync()">同步中央</button>
              <button class="secondary" onclick="runLocalSync()">同步本機媒體</button>
              <button class="secondary central-only" onclick="buildPlaylistFromUploaded()">建立全天循環</button>
            </div>
          </div>
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">近期 Client</div>
                <h2>連線狀態</h2>
              </div>
            </div>
            <div id="overview-clients" class="data-stack"></div>
          </div>
        </div>
      </section>

      <section class="admin-section" id="section-media">
        <div class="workspace-grid">
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">影片</div>
                <h2 id="media-form-title">新增影片</h2>
              </div>
              <button class="secondary" onclick="resetMediaForm()">清空</button>
            </div>
            <div class="stack form-stack">
              <input id="media-edit-id" type="hidden">
              <label>標題<input id="media-title" placeholder="例如：四月宣導短片"></label>
              <label>來源 URL<input id="media-url" placeholder="https://example.com/video.mp4 或 local-upload://檔名"></label>
              <label class="checkbox-label"><input type="checkbox" id="media-enabled" checked> 啟用</label>
              <div class="button-row">
                <button id="media-save-button" class="central-only" onclick="saveMedia()">新增影片</button>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">上傳</div>
                <h2>匯入影片檔</h2>
              </div>
            </div>
            <div class="stack">
              <label>影片檔<input id="media-files" type="file" accept="video/*" multiple></label>
              <div class="button-row">
                <button class="central-only" onclick="uploadMediaFiles()">上傳影片</button>
                <button class="secondary" onclick="runLocalSync()">下載目前影片</button>
              </div>
              <div class="small" id="upload-status">尚未選擇檔案。</div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="section-heading">
            <div>
              <div class="eyebrow">資料</div>
              <h2>影片清單</h2>
            </div>
          </div>
          <div id="media-list" class="data-stack"></div>
        </div>
      </section>

      <section class="admin-section" id="section-playlists">
        <div class="workspace-grid">
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">清單</div>
                <h2 id="playlist-form-title">新增播放清單</h2>
              </div>
              <button class="secondary" onclick="resetPlaylistForm()">清空</button>
            </div>
            <div class="stack form-stack">
              <input id="playlist-edit-id" type="hidden">
              <label>名稱<input id="playlist-name" placeholder="例如：上午輪播"></label>
              <label>說明<textarea id="playlist-description" rows="2"></textarea></label>
              <label>前台抬頭文字<input id="playlist-display-title"></label>
              <div class="dual-grid">
                <label>派送範圍
                  <select id="playlist-target-scope">
                    <option value="global">全部 client</option>
                    <option value="group">指定群組</option>
                    <option value="site">指定站點</option>
                  </select>
                </label>
                <label>派送代碼<input id="playlist-target-code" placeholder="branch-a 或 taipei-1"></label>
              </div>
              <label class="checkbox-label"><input type="checkbox" id="playlist-enabled" checked> 啟用</label>
              <button id="playlist-save-button" class="central-only" onclick="savePlaylist()">新增清單</button>
            </div>
          </div>
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">內容</div>
                <h2>影片順序</h2>
              </div>
            </div>
            <div class="split-stack">
              <div>
                <div class="subheading">已選影片</div>
                <div id="playlist-selected-list" class="selector-list empty-selector">尚未選擇影片</div>
              </div>
              <div>
                <div class="subheading">可加入影片</div>
                <div id="playlist-media-selector" class="selector-list"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="section-heading">
            <div>
              <div class="eyebrow">資料</div>
              <h2>播放清單</h2>
            </div>
          </div>
          <div id="playlist-list" class="data-stack"></div>
        </div>
      </section>

      <section class="admin-section" id="section-schedules">
        <div class="workspace-grid">
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">排程</div>
                <h2 id="schedule-form-title">新增排程</h2>
              </div>
              <button class="secondary" onclick="resetScheduleForm()">清空</button>
            </div>
            <div class="stack form-stack">
              <input id="schedule-edit-id" type="hidden">
              <label>名稱<input id="schedule-name" placeholder="例如：平日白天"></label>
              <label>播放清單<select id="schedule-playlist-id"></select></label>
              <div class="dual-grid">
                <label>派送範圍
                  <select id="schedule-target-scope">
                    <option value="global">全部 client</option>
                    <option value="group">指定群組</option>
                    <option value="site">指定站點</option>
                  </select>
                </label>
                <label>派送代碼<input id="schedule-target-code" placeholder="branch-a 或 taipei-1"></label>
              </div>
              <div>
                <div class="subheading">播放星期</div>
                <div class="weekday-row" id="weekday-selector"></div>
                <div class="button-row compact-actions">
                  <button class="secondary" type="button" onclick="setWeekdays([0,1,2,3,4])">平日</button>
                  <button class="secondary" type="button" onclick="setWeekdays([5,6])">週末</button>
                  <button class="secondary" type="button" onclick="setWeekdays([0,1,2,3,4,5,6])">每天</button>
                </div>
              </div>
              <div class="dual-grid">
                <label>開始日期<input id="schedule-start-date" type="date"></label>
                <label>結束日期<input id="schedule-end-date" type="date"></label>
              </div>
              <div class="small">起訖日可留空；有設定時包含當日。</div>
              <label class="checkbox-label"><input type="checkbox" id="schedule-no-end-date" checked onchange="toggleScheduleEndDate()"> 無結束日期</label>
              <div class="dual-grid">
                <label>開始時間<input id="schedule-start" value="08:00"></label>
                <label>結束時間<input id="schedule-end" value="18:00"></label>
              </div>
              <div class="dual-grid">
                <label>每日播放次數上限<input id="schedule-play-count" value="0" type="number" min="0"></label>
                <label>優先序<input id="schedule-priority" value="100" type="number" min="0"></label>
              </div>
              <label class="checkbox-label"><input type="checkbox" id="schedule-enabled" checked> 啟用</label>
              <button id="schedule-save-button" class="central-only" onclick="saveSchedule()">新增排程</button>
            </div>
          </div>
          <div class="panel">
            <div class="section-heading">
              <div>
                <div class="eyebrow">資料</div>
                <h2>排程列表</h2>
              </div>
            </div>
            <div id="schedule-list" class="data-stack"></div>
          </div>
        </div>
      </section>

      <section class="admin-section" id="section-clients">
        <div class="panel">
          <div class="section-heading">
            <div>
              <div class="eyebrow">Client</div>
              <h2>裝置狀態</h2>
            </div>
          </div>
          <div id="client-list" class="data-stack"></div>
        </div>
      </section>

      <section class="admin-section" id="section-settings">
        <div class="panel">
          <div class="section-heading">
            <div>
              <div class="eyebrow">設定</div>
              <h2>系統設定</h2>
            </div>
          </div>
          <div class="settings-grid">
            <label>時區<input id="settings-timezone" value="Asia/Taipei"></label>
            <label>同步秒數<input id="settings-sync-interval" value="300" type="number" min="30"></label>
            <label>中央管理端 URL<input id="settings-central-base-url" placeholder="https://central.example.com"></label>
            <label>公開服務 URL<input id="settings-public-base-url" placeholder="https://central.example.com"></label>
            <label>Client 註冊金鑰<input id="settings-registration-key" type="password" placeholder="中央與 client 需相同"></label>
            <label>Client 代碼<input id="settings-client-code" placeholder="例如：client-a"></label>
            <label>Client 名稱<input id="settings-client-name" placeholder="例如：台北一店播放器"></label>
            <label>站點名稱<input id="settings-client-site-name" placeholder="例如：taipei-1"></label>
            <label>群組代碼<input id="settings-client-group-name" placeholder="例如：branch-a"></label>
            <label>最新版本<input id="settings-latest-version" value="0.1.0"></label>
            <label>更新封包 URL<input id="settings-package-url" placeholder="https://server/banner-system.zip"></label>
            <label>管理密碼<input id="settings-admin-password" type="password" value="admin"></label>
            <label class="checkbox-label"><input type="checkbox" id="settings-show-player-brand"> 前台顯示程式名稱</label>
            <label class="checkbox-label"><input type="checkbox" id="settings-default-fullscreen"> 前台預設嘗試全螢幕</label>
          </div>
          <div class="button-row settings-actions">
            <button onclick="saveSettings()">儲存設定</button>
            <button class="secondary" onclick="runUpstreamSync()">立即同步</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let appRole = "client";
    let activeSection = "overview";
    let cachedMedia = [];
    let cachedPlaylists = [];
    let cachedSchedules = [];
    let cachedClients = [];
    let selectedPlaylistMediaIds = [];
    let selectedWeekdays = [0, 1, 2, 3, 4, 5, 6];

    const sectionTitles = {
      overview: ["總覽", "營運概況"],
      media: ["影片", "媒體內容"],
      playlists: ["清單", "播放清單"],
      schedules: ["排程", "播放排程"],
      clients: ["Client", "裝置狀態"],
      settings: ["設定", "系統設定"]
    };

    const weekdayOptions = [
      { value: 0, label: "一" },
      { value: 1, label: "二" },
      { value: 2, label: "三" },
      { value: 3, label: "四" },
      { value: 4, label: "五" },
      { value: 5, label: "六" },
      { value: 6, label: "日" }
    ];

    async function jsonFetch(url, options = {}) {
      const headers = options.body instanceof FormData ? {} : { "Content-Type": "application/json" };
      const response = await fetch(url, { headers, credentials: "same-origin", ...options });
      if (response.status === 401) {
        window.location.href = "/admin-login";
        throw new Error("請先登入管理後台。");
      }
      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.detail || JSON.stringify(payload) || "Request failed");
      }
      return response.json();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function targetLabel(scope, code) {
      if (scope === "group") return `群組：${code || "未指定"}`;
      if (scope === "site") return `站點：${code || "未指定"}`;
      return "全部 client";
    }

    function showSection(name) {
      activeSection = name;
      document.querySelectorAll(".admin-section").forEach(section => {
        section.classList.toggle("active", section.id === `section-${name}`);
      });
      document.querySelectorAll(".nav-item").forEach(button => {
        button.classList.toggle("active", button.dataset.section === name);
      });
      const [eyebrow, title] = sectionTitles[name] || sectionTitles.overview;
      document.getElementById("section-eyebrow").textContent = eyebrow;
      document.getElementById("section-title").textContent = title;
    }

    function renderSummaryCards(media, playlists, schedules) {
      document.getElementById("summary-cards").innerHTML = `
        <div class="stat-card"><div class="stat-label">影片</div><div class="stat-value">${media.length}</div><div class="small">啟用 ${media.filter(item => item.enabled).length}</div></div>
        <div class="stat-card"><div class="stat-label">清單</div><div class="stat-value">${playlists.length}</div><div class="small">啟用 ${playlists.filter(item => item.enabled).length}</div></div>
        <div class="stat-card"><div class="stat-label">排程</div><div class="stat-value">${schedules.length}</div><div class="small">啟用 ${schedules.filter(item => item.enabled).length}</div></div>
      `;
    }

    function rowActions(kind, id) {
      return appRole === "central"
        ? `<div class="row-actions"><button class="secondary small-button" onclick="edit${kind}(${id})">編輯</button><button class="danger small-button" onclick="delete${kind}(${id})">刪除</button></div>`
        : "";
    }

    function emptyState(text) {
      return `<div class="empty-selector">${escapeHtml(text)}</div>`;
    }

    function renderMediaList() {
      document.getElementById("media-list").innerHTML = cachedMedia.map(item => `
        <article class="data-row">
          <div><strong>${escapeHtml(item.title)}</strong><div class="small">${escapeHtml(item.local_file_name || item.source_url || "尚未下載")}</div></div>
          <div class="status-pill ${item.enabled ? "ok" : "muted"}">${item.enabled ? "啟用" : "停用"}</div>
          ${rowActions("Media", item.id)}
        </article>
      `).join("") || emptyState("尚無影片");
    }

    function renderPlaylistList() {
      document.getElementById("playlist-list").innerHTML = cachedPlaylists.map(item => `
        <article class="data-row">
          <div>
            <strong>${escapeHtml(item.name)}</strong>
            <div class="small">${escapeHtml(targetLabel(item.target_scope, item.target_code))} / ${(item.items || []).length} 支影片</div>
            <div class="small">${(item.items || []).map(x => `${x.position}. ${escapeHtml(x.media_title)}`).join(" / ") || "無項目"}</div>
          </div>
          <div class="status-pill ${item.enabled ? "ok" : "muted"}">${item.enabled ? "啟用" : "停用"}</div>
          ${rowActions("Playlist", item.id)}
        </article>
      `).join("") || emptyState("尚無播放清單");
    }

    function scheduleDateLabel(item) {
      if (item.start_date && item.end_date) return `${item.start_date} - ${item.end_date}`;
      if (item.start_date) return `${item.start_date} 起`;
      if (item.end_date) return `至 ${item.end_date}`;
      return "無期限";
    }

    function renderScheduleList() {
      document.getElementById("schedule-list").innerHTML = cachedSchedules.map(item => `
        <article class="data-row">
          <div>
            <strong>${escapeHtml(item.name)}</strong>
            <div class="small">${escapeHtml(targetLabel(item.target_scope, item.target_code))} / ${escapeHtml(scheduleDateLabel(item))} / ${escapeHtml(item.start_time)}-${escapeHtml(item.end_time)} / 優先序 ${item.priority}</div>
            <div class="small">星期 ${item.weekdays.join(",")} / 次數 ${item.play_count} / 已播 ${item.current_play_count}</div>
          </div>
          <div class="status-pill ${item.enabled ? "ok" : "muted"}">${item.enabled ? "啟用" : "停用"}</div>
          ${rowActions("Schedule", item.id)}
        </article>
      `).join("") || emptyState("尚無排程");
    }

    function renderClientList() {
      const html = cachedClients.map(item => `
        <article class="data-row">
          <div>
            <strong>${escapeHtml(item.client_code)}</strong>
            <div class="small">${escapeHtml(item.name)} / 站點 ${escapeHtml(item.site_name || "未設定")} / 群組 ${escapeHtml(item.group_name || "未設定")}</div>
            <div class="small">Manifest ${escapeHtml(item.last_manifest_version || "尚無")} / 同步 ${escapeHtml(item.last_sync_status || "尚無")}</div>
          </div>
          <div class="small">${escapeHtml(item.last_seen_at || "尚無回報")}</div>
        </article>
      `).join("") || emptyState(appRole === "central" ? "尚無 client 註冊資料" : "client 模式不顯示中央裝置清單");
      document.getElementById("client-list").innerHTML = html;
      document.getElementById("overview-clients").innerHTML = html;
    }

    function renderPlaylistSelector() {
      const container = document.getElementById("playlist-media-selector");
      if (!cachedMedia.length) {
        container.innerHTML = emptyState("目前沒有影片");
        return;
      }
      container.innerHTML = cachedMedia.map(item => {
        const selectedIndex = selectedPlaylistMediaIds.indexOf(item.id);
        return `
          <button type="button" class="selector-item ${selectedIndex >= 0 ? "active" : ""}" onclick="togglePlaylistMedia(${item.id})">
            <span>${escapeHtml(item.title)}</span>
            ${selectedIndex >= 0 ? `<span class="pill">#${selectedIndex + 1}</span>` : ""}
          </button>
        `;
      }).join("");
    }

    function renderSelectedPlaylist() {
      const container = document.getElementById("playlist-selected-list");
      if (!selectedPlaylistMediaIds.length) {
        container.className = "selector-list empty-selector";
        container.innerHTML = "尚未選擇影片";
        return;
      }
      container.className = "selector-list";
      container.innerHTML = selectedPlaylistMediaIds.map((mediaId, index) => {
        const item = cachedMedia.find(row => row.id === mediaId);
        if (!item) return "";
        return `
          <div class="selected-item">
            <div><span class="pill">#${index + 1}</span>${escapeHtml(item.title)}</div>
            <div class="button-row compact-actions">
              <button class="secondary small-button" type="button" onclick="movePlaylistMedia(${index}, -1)">上移</button>
              <button class="secondary small-button" type="button" onclick="movePlaylistMedia(${index}, 1)">下移</button>
              <button class="danger small-button" type="button" onclick="removePlaylistMedia(${mediaId})">移除</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function togglePlaylistMedia(mediaId) {
      const index = selectedPlaylistMediaIds.indexOf(mediaId);
      if (index >= 0) selectedPlaylistMediaIds.splice(index, 1);
      else selectedPlaylistMediaIds.push(mediaId);
      renderPlaylistSelector();
      renderSelectedPlaylist();
    }

    function movePlaylistMedia(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= selectedPlaylistMediaIds.length) return;
      const [item] = selectedPlaylistMediaIds.splice(index, 1);
      selectedPlaylistMediaIds.splice(target, 0, item);
      renderPlaylistSelector();
      renderSelectedPlaylist();
    }

    function removePlaylistMedia(mediaId) {
      selectedPlaylistMediaIds = selectedPlaylistMediaIds.filter(id => id !== mediaId);
      renderPlaylistSelector();
      renderSelectedPlaylist();
    }

    function renderPlaylistOptions() {
      const select = document.getElementById("schedule-playlist-id");
      const currentValue = select.value;
      select.innerHTML = cachedPlaylists.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join("") || "<option value=''>目前沒有播放清單</option>";
      if (currentValue && cachedPlaylists.some(item => String(item.id) === currentValue)) select.value = currentValue;
    }

    function renderWeekdaySelector() {
      document.getElementById("weekday-selector").innerHTML = weekdayOptions.map(item => `
        <button type="button" class="weekday-chip ${selectedWeekdays.includes(item.value) ? "active" : ""}" onclick="toggleWeekday(${item.value})">週${item.label}</button>
      `).join("");
    }

    function toggleWeekday(value) {
      if (selectedWeekdays.includes(value)) {
        if (selectedWeekdays.length === 1) return;
        selectedWeekdays = selectedWeekdays.filter(day => day !== value);
      } else {
        selectedWeekdays = [...selectedWeekdays, value].sort((a, b) => a - b);
      }
      renderWeekdaySelector();
    }

    function setWeekdays(days) {
      selectedWeekdays = [...days];
      renderWeekdaySelector();
    }

    async function loadAll() {
      const systemInfo = await jsonFetch("/api/system/info");
      appRole = systemInfo.app_role || "client";
      const requests = [
        jsonFetch("/api/media"),
        jsonFetch("/api/playlists"),
        jsonFetch("/api/schedules"),
        jsonFetch("/api/settings"),
        jsonFetch("/api/sync/status"),
        jsonFetch("/api/version")
      ];
      if (appRole === "central") requests.push(jsonFetch("/api/clients"));
      const [media, playlists, schedules, settings, syncStatus, version, clients = []] = await Promise.all(requests);

      cachedMedia = media;
      cachedPlaylists = playlists;
      cachedSchedules = schedules;
      cachedClients = clients;

      document.getElementById("settings-timezone").value = settings.timezone || "Asia/Taipei";
      document.getElementById("settings-sync-interval").value = settings.sync_interval_seconds || 300;
      document.getElementById("settings-central-base-url").value = settings.central_base_url || settings.upstream_manifest_url || "";
      document.getElementById("settings-public-base-url").value = settings.public_base_url || "";
      document.getElementById("settings-registration-key").value = settings.client_registration_key || "";
      document.getElementById("settings-client-code").value = settings.client_code || "";
      document.getElementById("settings-client-name").value = settings.client_name || "";
      document.getElementById("settings-client-site-name").value = settings.client_site_name || "";
      document.getElementById("settings-client-group-name").value = settings.client_group_name || "";
      document.getElementById("settings-latest-version").value = settings.latest_version || "";
      document.getElementById("settings-package-url").value = settings.latest_package_url || "";
      document.getElementById("settings-admin-password").value = settings.admin_password || "admin";
      document.getElementById("settings-show-player-brand").checked = (settings.show_player_brand || "").toLowerCase() === "true";
      document.getElementById("settings-default-fullscreen").checked = (settings.default_fullscreen || "").toLowerCase() === "true";

      document.getElementById("mode-status").textContent = appRole === "central"
        ? "中央管理端"
        : (settings.central_base_url ? `Client / ${settings.central_base_url}` : "Client / 未設定中央");
      document.getElementById("sync-status").textContent = syncStatus.running
        ? "同步執行中"
        : `最近：${syncStatus.last_finished_at || "尚無"}${syncStatus.last_error ? " / " + syncStatus.last_error : ""}`;
      document.getElementById("version-status").textContent = version.update_available
        ? `目前 ${version.current_version} / 最新 ${version.latest_version}`
        : `目前 ${version.current_version}`;

      renderSummaryCards(media, playlists, schedules);
      renderMediaList();
      renderPlaylistList();
      renderScheduleList();
      renderClientList();
      renderPlaylistSelector();
      renderSelectedPlaylist();
      renderPlaylistOptions();
      renderWeekdaySelector();
      applyRoleVisibility();
    }

    function applyRoleVisibility() {
      document.querySelectorAll(".central-only").forEach(element => {
        element.disabled = appRole !== "central";
        element.classList.toggle("is-disabled", appRole !== "central");
      });
      document.querySelector('[data-section="clients"]').style.display = appRole === "central" ? "block" : "none";
    }

    function resetMediaForm() {
      document.getElementById("media-edit-id").value = "";
      document.getElementById("media-title").value = "";
      document.getElementById("media-url").value = "";
      document.getElementById("media-enabled").checked = true;
      document.getElementById("media-save-button").textContent = "新增影片";
      document.getElementById("media-form-title").textContent = "新增影片";
    }

    async function saveMedia() {
      if (appRole !== "central") return;
      const editId = document.getElementById("media-edit-id").value;
      await jsonFetch(editId ? `/api/media/${editId}` : "/api/media", {
        method: editId ? "PUT" : "POST",
        body: JSON.stringify({
          title: document.getElementById("media-title").value,
          source_url: document.getElementById("media-url").value,
          enabled: document.getElementById("media-enabled").checked
        })
      });
      resetMediaForm();
      await loadAll();
    }

    function editMedia(id) {
      const item = cachedMedia.find(row => row.id === id);
      if (!item) return;
      showSection("media");
      document.getElementById("media-edit-id").value = item.id;
      document.getElementById("media-title").value = item.title;
      document.getElementById("media-url").value = item.source_url;
      document.getElementById("media-enabled").checked = !!item.enabled;
      document.getElementById("media-save-button").textContent = "更新影片";
      document.getElementById("media-form-title").textContent = "編輯影片";
    }

    async function deleteMedia(id) {
      if (appRole !== "central" || !confirm(`確定要刪除影片 #${id} 嗎？`)) return;
      await jsonFetch(`/api/media/${id}`, { method: "DELETE" });
      if (document.getElementById("media-edit-id").value === String(id)) resetMediaForm();
      selectedPlaylistMediaIds = selectedPlaylistMediaIds.filter(mediaId => mediaId !== id);
      await loadAll();
    }

    async function uploadMediaFiles() {
      if (appRole !== "central") return;
      const input = document.getElementById("media-files");
      if (!input.files.length) {
        document.getElementById("upload-status").textContent = "請先選擇至少一支影片。";
        return;
      }
      const formData = new FormData();
      for (const file of input.files) formData.append("files", file);
      const result = await jsonFetch("/api/media/upload", { method: "POST", body: formData });
      document.getElementById("upload-status").textContent = `已上傳 ${result.count} 支影片。`;
      input.value = "";
      await loadAll();
    }

    function resetPlaylistForm() {
      document.getElementById("playlist-edit-id").value = "";
      document.getElementById("playlist-name").value = "";
      document.getElementById("playlist-description").value = "";
      document.getElementById("playlist-display-title").value = "";
      document.getElementById("playlist-target-scope").value = "global";
      document.getElementById("playlist-target-code").value = "";
      document.getElementById("playlist-enabled").checked = true;
      document.getElementById("playlist-save-button").textContent = "新增清單";
      document.getElementById("playlist-form-title").textContent = "新增播放清單";
      selectedPlaylistMediaIds = [];
      renderPlaylistSelector();
      renderSelectedPlaylist();
    }

    async function savePlaylist() {
      if (appRole !== "central") return;
      const items = selectedPlaylistMediaIds.map((value, index) => ({ media_id: Number(value), position: index + 1 }));
      const editId = document.getElementById("playlist-edit-id").value;
      await jsonFetch(editId ? `/api/playlists/${editId}` : "/api/playlists", {
        method: editId ? "PUT" : "POST",
        body: JSON.stringify({
          name: document.getElementById("playlist-name").value,
          description: document.getElementById("playlist-description").value,
          display_title: document.getElementById("playlist-display-title").value,
          target_scope: document.getElementById("playlist-target-scope").value,
          target_code: document.getElementById("playlist-target-code").value.trim() || null,
          enabled: document.getElementById("playlist-enabled").checked,
          items
        })
      });
      resetPlaylistForm();
      await loadAll();
    }

    function editPlaylist(id) {
      const item = cachedPlaylists.find(row => row.id === id);
      if (!item) return;
      showSection("playlists");
      document.getElementById("playlist-edit-id").value = item.id;
      document.getElementById("playlist-name").value = item.name;
      document.getElementById("playlist-description").value = item.description || "";
      document.getElementById("playlist-display-title").value = item.display_title || "";
      document.getElementById("playlist-target-scope").value = item.target_scope || "global";
      document.getElementById("playlist-target-code").value = item.target_code || "";
      document.getElementById("playlist-enabled").checked = !!item.enabled;
      document.getElementById("playlist-save-button").textContent = "更新清單";
      document.getElementById("playlist-form-title").textContent = "編輯播放清單";
      selectedPlaylistMediaIds = (item.items || []).sort((a, b) => a.position - b.position).map(x => x.media_id);
      renderPlaylistSelector();
      renderSelectedPlaylist();
    }

    async function deletePlaylist(id) {
      if (appRole !== "central" || !confirm(`確定要刪除播放清單 #${id} 嗎？`)) return;
      await jsonFetch(`/api/playlists/${id}`, { method: "DELETE" });
      if (document.getElementById("playlist-edit-id").value === String(id)) resetPlaylistForm();
      await loadAll();
    }

    function todayInputValue() {
      const now = new Date();
      const offsetMs = now.getTimezoneOffset() * 60 * 1000;
      return new Date(now.getTime() - offsetMs).toISOString().slice(0, 10);
    }

    function toggleScheduleEndDate() {
      const noEndDate = document.getElementById("schedule-no-end-date").checked;
      const endDateInput = document.getElementById("schedule-end-date");
      endDateInput.disabled = noEndDate;
      if (noEndDate) endDateInput.value = "";
    }

    function resetScheduleForm() {
      document.getElementById("schedule-edit-id").value = "";
      document.getElementById("schedule-name").value = "";
      document.getElementById("schedule-target-scope").value = "global";
      document.getElementById("schedule-target-code").value = "";
      document.getElementById("schedule-start-date").value = "";
      document.getElementById("schedule-no-end-date").checked = true;
      toggleScheduleEndDate();
      document.getElementById("schedule-start").value = "08:00";
      document.getElementById("schedule-end").value = "18:00";
      document.getElementById("schedule-play-count").value = "0";
      document.getElementById("schedule-priority").value = "100";
      document.getElementById("schedule-enabled").checked = true;
      document.getElementById("schedule-save-button").textContent = "新增排程";
      document.getElementById("schedule-form-title").textContent = "新增排程";
      setWeekdays([0, 1, 2, 3, 4, 5, 6]);
      renderPlaylistOptions();
      if (cachedPlaylists.length) document.getElementById("schedule-playlist-id").value = String(cachedPlaylists[0].id);
    }

    async function saveSchedule() {
      if (appRole !== "central") return;
      const editId = document.getElementById("schedule-edit-id").value;
      await jsonFetch(editId ? `/api/schedules/${editId}` : "/api/schedules", {
        method: editId ? "PUT" : "POST",
        body: JSON.stringify({
          name: document.getElementById("schedule-name").value,
          playlist_id: Number(document.getElementById("schedule-playlist-id").value),
          target_scope: document.getElementById("schedule-target-scope").value,
          target_code: document.getElementById("schedule-target-code").value.trim() || null,
          weekdays: selectedWeekdays,
          start_date: document.getElementById("schedule-start-date").value || null,
          end_date: document.getElementById("schedule-no-end-date").checked ? null : (document.getElementById("schedule-end-date").value || null),
          start_time: document.getElementById("schedule-start").value,
          end_time: document.getElementById("schedule-end").value,
          play_count: Number(document.getElementById("schedule-play-count").value),
          priority: Number(document.getElementById("schedule-priority").value),
          enabled: document.getElementById("schedule-enabled").checked
        })
      });
      resetScheduleForm();
      await loadAll();
    }

    function editSchedule(id) {
      const item = cachedSchedules.find(row => row.id === id);
      if (!item) return;
      showSection("schedules");
      document.getElementById("schedule-edit-id").value = item.id;
      document.getElementById("schedule-name").value = item.name;
      document.getElementById("schedule-playlist-id").value = String(item.playlist_id);
      document.getElementById("schedule-target-scope").value = item.target_scope || "global";
      document.getElementById("schedule-target-code").value = item.target_code || "";
      document.getElementById("schedule-start-date").value = item.start_date || "";
      document.getElementById("schedule-no-end-date").checked = !item.end_date;
      document.getElementById("schedule-end-date").value = item.end_date || "";
      toggleScheduleEndDate();
      document.getElementById("schedule-start").value = item.start_time;
      document.getElementById("schedule-end").value = item.end_time;
      document.getElementById("schedule-play-count").value = item.play_count;
      document.getElementById("schedule-priority").value = item.priority;
      document.getElementById("schedule-enabled").checked = !!item.enabled;
      document.getElementById("schedule-save-button").textContent = "更新排程";
      document.getElementById("schedule-form-title").textContent = "編輯排程";
      setWeekdays(item.weekdays);
    }

    async function deleteSchedule(id) {
      if (appRole !== "central" || !confirm(`確定要刪除排程 #${id} 嗎？`)) return;
      await jsonFetch(`/api/schedules/${id}`, { method: "DELETE" });
      if (document.getElementById("schedule-edit-id").value === String(id)) resetScheduleForm();
      await loadAll();
    }

    async function saveSettings() {
      await jsonFetch("/api/settings", {
        method: "PUT",
        body: JSON.stringify({
          timezone: document.getElementById("settings-timezone").value,
          sync_interval_seconds: Number(document.getElementById("settings-sync-interval").value),
          central_base_url: document.getElementById("settings-central-base-url").value,
          upstream_manifest_url: document.getElementById("settings-central-base-url").value,
          public_base_url: document.getElementById("settings-public-base-url").value,
          client_registration_key: document.getElementById("settings-registration-key").value,
          client_code: document.getElementById("settings-client-code").value,
          client_name: document.getElementById("settings-client-name").value,
          client_site_name: document.getElementById("settings-client-site-name").value,
          client_group_name: document.getElementById("settings-client-group-name").value,
          latest_version: document.getElementById("settings-latest-version").value,
          latest_package_url: document.getElementById("settings-package-url").value,
          admin_password: document.getElementById("settings-admin-password").value,
          show_player_brand: document.getElementById("settings-show-player-brand").checked,
          default_fullscreen: document.getElementById("settings-default-fullscreen").checked
        })
      });
      await loadAll();
    }

    async function runLocalSync() {
      await jsonFetch("/api/sync/local", { method: "POST" });
      await loadAll();
    }

    async function runUpstreamSync() {
      if (appRole === "central") {
        await loadAll();
        return;
      }
      const centralBaseUrl = document.getElementById("settings-central-base-url").value.trim();
      if (!centralBaseUrl) {
        alert("請先設定中央管理端 URL。");
        showSection("settings");
        return;
      }
      await jsonFetch("/api/sync/upstream", { method: "POST" });
      await loadAll();
    }

    async function buildPlaylistFromUploaded() {
      if (appRole !== "central") return;
      const media = await jsonFetch("/api/media");
      if (!media.length) {
        alert("目前沒有影片可建立清單。");
        return;
      }
      const items = media.map((item, index) => ({ media_id: item.id, position: index + 1 }));
      const name = `auto-loop-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}`;
      const playlist = await jsonFetch("/api/playlists", {
        method: "POST",
        body: JSON.stringify({ name, description: "由後台自動建立的循環清單", display_title: "輪播清單", target_scope: "global", target_code: null, enabled: true, items })
      });
      await jsonFetch("/api/schedules", {
        method: "POST",
        body: JSON.stringify({ name: `${name}-schedule`, playlist_id: playlist.id, target_scope: "global", target_code: null, weekdays: [0, 1, 2, 3, 4, 5, 6], start_date: todayInputValue(), end_date: null, start_time: "00:00", end_time: "23:59", play_count: 0, priority: 1, enabled: true })
      });
      await loadAll();
      showSection("schedules");
    }

    async function logoutAdmin() {
      await jsonFetch("/api/admin/logout", { method: "POST" });
      window.location.href = "/admin-login";
    }

    showSection("overview");
    resetMediaForm();
    resetPlaylistForm();
    resetScheduleForm();
    renderWeekdaySelector();
    loadAll();
    setInterval(loadAll, 20000);
  </script>
</body>
</html>
